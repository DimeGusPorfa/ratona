<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Preciosa Novia</title>
    <!-- Cargamos Tailwind CSS para los estilos rápidos de diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Enlazamos nuestro archivo CSS personalizado -->
    <link rel="stylesheet" href="styles.css">
</head>

<body class="selection:bg-pink-300 selection:text-pink-900">

    <!-- Contenedor principal de toda la página -->
    <div class="min-h-screen relative overflow-hidden flex flex-col items-center py-12 px-4">

        <!-- Contenedor donde se inyectarán los corazones flotantes de fondo vía JavaScript -->
        <div id="hearts-container" class="absolute inset-0 pointer-events-none z-0"></div>

        <!-- Encabezado de la página (Título y Subtítulo) -->
        <div class="z-10 text-center mb-10 max-w-2xl mt-8">
            <h1 class="text-4xl md:text-6xl font-serif text-pink-700 mb-3 tracking-wide drop-shadow-sm">
                Prueba de que estás preciosa 🐭💕
            </h1>
            <p class="text-pink-500 text-lg md:text-xl font-light italic opacity-80">
                de verdad eres una preciosura
            </p>
        </div>

        <!-- Galería de Cartas Interactivas (Las imágenes se inyectarán aquí por JS) -->
        <div id="cards-container" class="relative w-64 h-64 sm:w-80 sm:h-80 md:w-96 md:h-96 z-20 mt-4 mb-8">
            <!-- Las cartas se generan dinámicamente en script.js -->
        </div>

        <!-- Sección inferior: Reproductores de Audio y Spotify -->
        <div class="mt-12 w-full max-w-md z-10 flex flex-col gap-6">

            <!-- Reproductor de Spotify -->
            <div
                class="bg-white/50 backdrop-blur-lg p-5 rounded-3xl shadow-sm border border-pink-100/50 transition-transform hover:scale-[1.02] duration-300">
                <div class="flex items-center gap-2 text-pink-700 font-medium mb-3 ml-2">
                    <!-- Icono de Disco en formato SVG -->
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="12" cy="12" r="10"></circle>
                        <circle cx="12" cy="12" r="3"></circle>
                    </svg>
                    <span> Te dedico toda esta Playlist</span>
                </div>
                <!-- Pega aquí el código <iframe> que te da Spotify al compartir una playlist -->
                <iframe style="border-radius: 16px;"
                    src="https://open.spotify.com/embed/playlist/7q98hIlNv2iJye0tTgf4MR?si=7a155aaa4bae4d89&pt=485b94185ce35b4e50694cafc6563d82"
                    width="100%" height="152" frameBorder="0" allowFullScreen=""
                    allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy">
                </iframe>
            </div>

        </div>

    </div>

    <!-- Enlazamos nuestro archivo JavaScript al final para que cargue después del contenido HTML -->
    <script src="script.js"></script>
</body>

</html>
